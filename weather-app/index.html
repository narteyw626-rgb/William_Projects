<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🌤️ Weather App</h1>
            <p>Get real-time weather updates</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..." 
                    autocomplete="off"
                >
                <button id="searchBtn" aria-label="Search">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <div id="suggestions" class="suggestions"></div>
        </div>

        <!-- Current Weather Section -->
        <div id="weatherContainer" class="weather-container hidden">
            <div class="current-weather">
                <div class="location-info">
                    <h2 id="cityName"></h2>
                    <p id="date"></p>
                </div>
                <div class="weather-main">
                    <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
                    <div class="temperature-section">
                        <span id="temperature" class="temperature"></span>
                        <span id="weatherDescription" class="description"></span>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail">
                        <i class="fas fa-droplets"></i>
                        <span>Humidity: <strong id="humidity"></strong></span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-wind"></i>
                        <span>Wind: <strong id="windSpeed"></strong></span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-eye"></i>
                        <span>Visibility: <strong id="visibility"></strong></span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-compress"></i>
                        <span>Pressure: <strong id="pressure"></strong></span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-temperature-high"></i>
                        <span>Feels Like: <strong id="feelsLike"></strong></span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-cloud"></i>
                        <span>Cloudiness: <strong id="cloudiness"></strong></span>
                    </div>
                </div>
            </div>

            <!-- Forecast Section -->
            <div class="forecast-section">
                <h3>5-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-container"></div>
            </div>

            <!-- UV Index and Sunrise/Sunset -->
            <div class="additional-info">
                <div class="info-card">
                    <i class="fas fa-sun"></i>
                    <div>
                        <p>Sunrise</p>
                        <strong id="sunrise"></strong>
                    </div>
                </div>
                <div class="info-card">
                    <i class="fas fa-moon"></i>
                    <div>
                        <p>Sunset</p>
                        <strong id="sunset"></strong>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden"></div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
